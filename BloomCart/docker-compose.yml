services:

  app:
    build: .
    ports:
      - "8080:8080"

    depends_on:
      - db

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/BloomCartDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Chandanpreet@2006

  db:
    image: postgres

    environment:
      POSTGRES_DB: BloomCartDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Chandanpreet@2006

    ports:
      - "5432:5432"